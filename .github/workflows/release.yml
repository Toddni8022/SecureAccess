name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureAccess-Windows
          path: dist/SecureAccess.exe

  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureAccess-macOS
          path: dist/SecureAccess

  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureAccess-Linux
          path: dist/SecureAccess

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SecureAccess-Windows/SecureAccess.exe
            SecureAccess-macOS/SecureAccess
            SecureAccess-Linux/SecureAccess
          generate_release_notes: true
