name: CI

on:
  push:
    branches: [main, master, "copilot/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff mypy
          pip install bcrypt pillow reportlab
          # Skip GUI deps (customtkinter/tkinter) for headless CI
          pip install pytest-mock

      - name: Lint with ruff
        run: ruff check src/ tests/ database.py connectors.py --ignore E501

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov=database --cov=connectors --cov-report=xml --cov-report=term-missing -k "not gui"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
